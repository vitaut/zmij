name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - uses: actions/checkout@v4
      - run: cmake -B build
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure
